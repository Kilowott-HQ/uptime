# ----------------------------------------------------------------------
# Status page settings
# ----------------------------------------------------------------------
status-website:
  baseUrl: /uptime
  name: Kilowott status
  introTitle: "**Service status**"
  introMessage: |
    Real-time uptime and response-time for Kilowott services.
    Maintained by the Kilowott DevOps team. Updated every 5 minutes.
  navbar:
    - title: Status
      href: /uptime/
    - title: GitHub
      href: https://github.com/Kilowott-labs/uptime

# ----------------------------------------------------------------------
# Workflow settings
# ----------------------------------------------------------------------
# Upptime auto-schedules the uptime check workflow. Default is */5 minutes
# (matches your "every 5 minutes" choice). No action needed here unless
# you want to change it — that's configured in the workflow YAML itself
# via Upptime's own repo actions.

workflowSchedule:
  graphs: "0 0 * * *"          # regenerate graphs daily at midnight UTC
  responseTime: "0 23 * * *"   # recalc response-time stats daily
  staticSite: "0 1 * * *"      # rebuild status page daily
  summary: "0 0 * * *"         # daily summary regenerated
  updateTemplate: "0 0 * * 1"  # pull upstream template updates weekly (Monday)
  updates: "0 3 * * *"         # check for package updates
  uptime: "*/5 * * * *"        # uptime check every 5 minutes

# ----------------------------------------------------------------------
# Assignees — who gets GitHub-notified on incidents
# ----------------------------------------------------------------------
# Upptime opens a GitHub issue on every downtime event. Assignees get
# notifications. Add GitHub usernames of the people you want pinged.
assignees:
  - ajajrajguruKW   # replace with actual handle(s) of your ops team

# ----------------------------------------------------------------------
# Notification channels
# ----------------------------------------------------------------------
# Upptime supports multiple notification backends. Webhooks are simplest
# (same pattern as Phase 3c's Slack notify once admin approves).
#
# See full list: https://upptime.js.org/docs/notifications

notifications:
