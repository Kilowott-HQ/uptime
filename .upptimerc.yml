# Kilowott Uptime — Upptime config
# ----------------------------------
# Docs: https://upptime.js.org/docs/configuration
#
# Check interval, notification channels, and site list live here.
# Edit `sites:` below to add/remove URLs. Each site gets its own status
# badge, history, and incident log.

owner: Kilowott-labs
repo: uptime

# ----------------------------------------------------------------------
# Site list
# ----------------------------------------------------------------------
# Format:
#   - name: "Human-readable name"
#     url: https://...
#     tags: [production|staging, client-name|internal]  # optional, for filtering/display
#     expectedStatusCodes: [200]  # optional, default 200-299
#     maxResponseTime: 5000       # optional, milliseconds — fails if slower
#
# Add one entry per site. The more descriptive the name, the clearer
# the status page + alerts.

